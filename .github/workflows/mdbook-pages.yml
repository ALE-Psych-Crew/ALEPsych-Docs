name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 0.4.52

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install mdBook plugins
        run: |
          cargo install mdbook-admonish --version 1.20.0 --locked
          cargo install mdbook-mermaid --version 0.15.0 --locked
          cargo install mdbook-pagetoc --version 0.1.8 --locked

      - name: Sanity check configured static theme assets
        run: |
          python - <<'PY'
          from pathlib import Path
          import tomllib

          config_path = Path("book/book.toml")
          config = tomllib.loads(config_path.read_text(encoding="utf-8"))

          html = config.get("output", {}).get("html", {})
          static_refs = list(html.get("additional-css", [])) + list(html.get("additional-js", []))

          missing = [ref for ref in static_refs if not (Path("book") / ref).exists()]
          if missing:
              raise SystemExit(
                  "Missing static files referenced by book/book.toml:\n"
                  + "\n".join(f"- {ref}" for ref in missing)
              )

          print("Static asset sanity check passed:")
          for ref in static_refs:
              print(f"- {ref}")
          PY

      - name: Build site
        run: mdbook build book

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
